# Nginx Reverse Proxy Configuration for Heaven Bakers
# Place this file in: nginx/conf/nginx.conf (Windows)
# Or include it in your main nginx.conf

# Upstream configuration for Docker containers
upstream heavenbaker_frontend {
    server localhost:8080;
}

upstream heavenbaker_backend {
    server localhost:5000;
}

server {
    listen 80;
    server_name heavenbaker.com www.heavenbaker.com;

    # Increase buffer sizes for large requests
    client_max_body_size 50M;
    client_body_buffer_size 128k;

    # Logging
    access_log logs/heavenbaker_access.log;
    error_log logs/heavenbaker_error.log;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Proxy settings for all locations
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;

    # Timeout settings
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Backend API routes - must be before /application
    location /application/api/ {
        proxy_pass http://heavenbaker_backend/api/;
        
        # Additional backend-specific settings
        proxy_buffering off;
    }

    # Frontend static assets - must be before /application
    location /application/assets/ {
        proxy_pass http://heavenbaker_frontend/application/assets/;
        
        # Cache static assets
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, immutable";
    }

    # Frontend application
    location /application/ {
        proxy_pass http://heavenbaker_frontend/application/;
        
        # Rewrite location header for redirects
        proxy_redirect off;
        
        # Handle WebSocket connections if needed
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    
    # Exact match for /application (without trailing slash)
    location = /application {
        proxy_pass http://heavenbaker_frontend/application;
    }

    # Redirect root to application
    location = / {
        return 301 /application;
    }

    # Optional: Health check endpoint
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}

# Optional: Redirect www to non-www (or vice versa)
# Uncomment if you prefer non-www
